name: publish

# Publishes the Python package (python/) to PyPI via trusted publishing (OIDC).
# No API token is stored: PyPI is configured with a trusted publisher for this
# repository and this workflow filename. Triggered when a GitHub release is
# published, or manually.

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for PyPI trusted publishing
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build sdist and wheel
        working-directory: python
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Check metadata
        working-directory: python
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/dist
